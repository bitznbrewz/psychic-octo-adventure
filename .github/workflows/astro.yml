name: Deploy Astro site to GitHub Pages

on:
  # Run on pushes and pull requests to the default branch (usually main or master)
  push:
    branches: [main]
  pull_request:
    branches: [main]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Allow only one concurrent deployment, skipping queued ones between runs
concurrency:
  group: "pages"
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4

      - name: Install, build, and upload your site
        uses: withastro/action@v2
        # with: # ← optional inputs
        #   path: . # The root location of your Astro project inside the repository. (default = .)
        #   node-version: 20 # The specific version of Node that should be used to build your site. Defaults to 20. (Node v20 is strongly recommended)
        #   package-manager: pnpm@latest # If you use something other than pnpm (npm, yarn, bun...)
        #   build-command: pnpm run build -- --site https://myusername.github.io/my-blog/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
